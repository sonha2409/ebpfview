name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Generate BPF
        run: make generate

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Generate BPF
        run: make generate

      - name: Run unit tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang llvm libbpf-dev

      - name: Generate BPF
        run: make generate

      - name: Build binaries
        run: make build

      - name: Verify binaries exist
        run: |
          test -f build/ebpfview
          test -f build/ebpfviewd
