name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF toolchain and generate vmlinux.h
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          # Try bpftool from linux-tools; the wrapper may fail on newer kernels.
          sudo apt-get install -y linux-tools-common linux-tools-$(uname -r) 2>/dev/null || true
          # Attempt bpftool dump — guard with || true since the wrapper can exit 2.
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/c/vmlinux.h 2>/dev/null || true
          fi
          # If bpftool failed or wasn't available, generate via pahole + /sys/kernel/btf/vmlinux.
          if [ ! -s bpf/c/vmlinux.h ] && [ -f /sys/kernel/btf/vmlinux ]; then
            sudo apt-get install -y dwarves 2>/dev/null || true
            # pahole can also dump BTF to C header
            pahole --btf_encode_detached /dev/stdout /sys/kernel/btf/vmlinux 2>/dev/null | true
            # Last resort: use python to read raw BTF and produce a minimal header.
            # For now, download a known-good vmlinux.h from the libbpf bootstrap.
            curl -fsSL "https://raw.githubusercontent.com/libbpf/libbpf-bootstrap/master/vmlinux/vmlinux_608.h" \
              -o bpf/c/vmlinux.h 2>/dev/null || true
          fi
          if [ ! -s bpf/c/vmlinux.h ]; then
            echo "::error::Failed to produce vmlinux.h"
            exit 1
          fi

      - name: Generate BPF
        run: make generate

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF toolchain and generate vmlinux.h
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          sudo apt-get install -y linux-tools-common linux-tools-$(uname -r) 2>/dev/null || true
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/c/vmlinux.h 2>/dev/null || true
          fi
          if [ ! -s bpf/c/vmlinux.h ] && [ -f /sys/kernel/btf/vmlinux ]; then
            curl -fsSL "https://raw.githubusercontent.com/libbpf/libbpf-bootstrap/master/vmlinux/vmlinux_608.h" \
              -o bpf/c/vmlinux.h 2>/dev/null || true
          fi
          if [ ! -s bpf/c/vmlinux.h ]; then
            echo "::error::Failed to produce vmlinux.h"
            exit 1
          fi

      - name: Generate BPF
        run: make generate

      - name: Run unit tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF toolchain and generate vmlinux.h
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm
          sudo apt-get install -y linux-tools-common linux-tools-$(uname -r) 2>/dev/null || true
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/c/vmlinux.h 2>/dev/null || true
          fi
          if [ ! -s bpf/c/vmlinux.h ] && [ -f /sys/kernel/btf/vmlinux ]; then
            curl -fsSL "https://raw.githubusercontent.com/libbpf/libbpf-bootstrap/master/vmlinux/vmlinux_608.h" \
              -o bpf/c/vmlinux.h 2>/dev/null || true
          fi
          if [ ! -s bpf/c/vmlinux.h ]; then
            echo "::error::Failed to produce vmlinux.h"
            exit 1
          fi

      - name: Generate BPF
        run: make generate

      - name: Build binaries
        run: make build

      - name: Verify binaries exist
        run: |
          test -f build/ebpfview
          test -f build/ebpfviewd
