name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-tools-common linux-tools-$(uname -r) || true
          # Fallback: if linux-tools not available, use bpftool from PATH or generate minimal vmlinux.h
          if command -v bpftool &>/dev/null && [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/c/vmlinux.h
          else
            # Use a pre-generated vmlinux.h from libbpf/btf archive for CI
            sudo apt-get install -y libbpf-dev || true
            if [ -f /usr/include/bpf/vmlinux/vmlinux.h ]; then
              cp /usr/include/bpf/vmlinux/vmlinux.h bpf/c/vmlinux.h
            fi
          fi

      - name: Generate BPF
        run: make generate

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-tools-common linux-tools-$(uname -r) || true
          if command -v bpftool &>/dev/null && [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/c/vmlinux.h
          else
            sudo apt-get install -y libbpf-dev || true
            if [ -f /usr/include/bpf/vmlinux/vmlinux.h ]; then
              cp /usr/include/bpf/vmlinux/vmlinux.h bpf/c/vmlinux.h
            fi
          fi

      - name: Generate BPF
        run: make generate

      - name: Run unit tests
        run: make test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install BPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm linux-tools-common linux-tools-$(uname -r) || true
          if command -v bpftool &>/dev/null && [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > bpf/c/vmlinux.h
          else
            sudo apt-get install -y libbpf-dev || true
            if [ -f /usr/include/bpf/vmlinux/vmlinux.h ]; then
              cp /usr/include/bpf/vmlinux/vmlinux.h bpf/c/vmlinux.h
            fi
          fi

      - name: Generate BPF
        run: make generate

      - name: Build binaries
        run: make build

      - name: Verify binaries exist
        run: |
          test -f build/ebpfview
          test -f build/ebpfviewd
